<?xml version="1.0" encoding="ISO-8859-1"?>
<PARAMETERS version="1.7.0" xsi:noNamespaceSchemaLocation="https://raw.githubusercontent.com/OpenMS/OpenMS/develop/share/OpenMS/SCHEMAS/Param_1_7_0.xsd" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <NODE name="FLASHTnT" description="FLASHTnT to generate de novo sequence tags from TDP spectrum and match them against proteome DB for proteoform identification.">
    <ITEM name="version" value="3.1.0-pre-FDdevelop-2025-05-02" type="string" description="Version of the tool that generated this parameters file." required="false" advanced="true" />
    <NODE name="1" description="Instance &apos;1&apos; section for &apos;FLASHTnT&apos;">
      <ITEM name="in" value="" type="input-file" description="Input file (deconv.mzML from FLASHDeconv mzML output)." required="true" advanced="false" supported_formats="*.mzML" />
      <ITEM name="fasta" value="" type="input-file" description="Input proteome database file (fasta)" required="true" advanced="false" supported_formats="*.fasta" />
      <ITEM name="out_pro" value="" type="output-file" description="Output proteoform-level tsv file containing proteoform IDs. " required="true" advanced="false" supported_formats="*.tsv" />
      <ITEM name="out_prsm" value="" type="output-file" description="Output PrSM-level tsv file containing PrSMs." required="true" advanced="false" supported_formats="*.tsv" />
      <ITEM name="out_tag" value="" type="output-file" description="Output tag-level tsv file containing matched tags." required="true" advanced="false" supported_formats="*.tsv" />
      <ITEM name="prsm_fdr" value="1.0" type="double" description="Specifies the PrSM-level FDR." required="false" advanced="false" restrictions="0.0:" />
      <ITEM name="pro_fdr" value="1.0" type="double" description="Specifies the proteoform-level FDR." required="false" advanced="false" restrictions="0.0:" />
      <ITEM name="only_single_hit" value="false" type="bool" description="Allows only a single hit per spectrum." required="false" advanced="true" />
      <ITEM name="discard_underdetermined" value="false" type="bool" description="Discards underdetermined proteoform IDs (e.g., those without exact precursor masses or start/end positions)." required="false" advanced="false" />
      <ITEM name="keep_decoy" value="false" type="bool" description="Retains decoy hits in the results." required="false" advanced="false" />
      <ITEMLIST name="ion_type" type="string" description="Specifies ion types to consider." required="false" advanced="false" restrictions="b,c,a,y,z,x,zp1,zp2">
        <LISTITEM value="b"/>
        <LISTITEM value="y"/>
      </ITEMLIST>
      <ITEM name="log" value="" type="string" description="Name of log file (created only when specified)" required="false" advanced="true" />
      <ITEM name="debug" value="0" type="int" description="Sets the debug level" required="false" advanced="true" />
      <ITEM name="threads" value="1" type="int" description="Sets the number of threads allowed to be used by the TOPP tool" required="false" advanced="false" />
      <ITEM name="no_progress" value="false" type="bool" description="Disables progress logging to command line" required="false" advanced="true" />
      <ITEM name="force" value="false" type="bool" description="Overrides tool-specific checks" required="false" advanced="true" />
      <ITEM name="test" value="false" type="bool" description="Enables the test mode (needed for internal use only)" required="false" advanced="true" />
      <NODE name="ex" description="Extension algorithm parameters">
        <ITEM name="max_mod_mass" value="500.0" type="double" description="Maximum mass shift allowed for modifications." required="false" advanced="false" />
        <ITEM name="max_mod_count" value="2" type="int" description="Maximum number of blind modifications." required="false" advanced="false" />
      </NODE>
      <NODE name="tag" description="Tag algorithm parameters">
        <ITEM name="min_length" value="3" type="int" description="Minimum tag length, where each mass gap contributes one unit of length (even if represented by multiple amino acids). For instance, the length of TA[255]G is 4." required="false" advanced="false" restrictions="3:9" />
        <ITEM name="max_length" value="8" type="int" description="Maximum tag length, where each mass gap contributes one unit of length (even if represented by multiple amino acids). For instance, the length of TA[255]G is 4." required="false" advanced="false" restrictions="3:30" />
        <ITEM name="allow_gap" value="false" type="bool" description="Allows mass gaps (representing multiple consecutive amino acids) in tags." required="false" advanced="true" />
        <ITEM name="max_aa_in_gap" value="2" type="int" description="Maximum number of amino acids in a mass gap." required="false" advanced="true" restrictions="2:3" />
      </NODE>
    </NODE>
  </NODE>
</PARAMETERS>
