<?xml version="1.0" encoding="ISO-8859-1"?>
<PARAMETERS version="1.7.0" xsi:noNamespaceSchemaLocation="https://raw.githubusercontent.com/OpenMS/OpenMS/develop/share/OpenMS/SCHEMAS/Param_1_7_0.xsd" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <NODE name="FLASHDeconv" description="Ultra-fast high-quality deconvolution enables online processing of top-down MS data">
    <ITEM name="version" value="3.1.0-pre-FDdevelop-2025-05-02" type="string" description="Version of the tool that generated this parameters file." required="false" advanced="true" />
    <NODE name="1" description="Instance &apos;1&apos; section for &apos;FLASHDeconv&apos;">
      <ITEM name="in" value="" type="input-file" description="Input file in mzML format. " required="true" advanced="false" supported_formats="*.mzML" />
      <ITEM name="out" value="" type="output-file" description="Default output tsv file containing deconvolved features" required="true" advanced="false" supported_formats="*.tsv" />
      <ITEM name="out_spec1" value="" type="output-file" description="Output tsv file for deconvolved MS1 spectra. Use -out_spec2, ..., -out_spec4 for MS2, ..., MS4 spectra." required="false" advanced="false" supported_formats="*.tsv" />
      <ITEM name="out_spec2" value="" type="output-file" description="Output TSV files for deconvolved MS2 spectra." required="false" advanced="true" supported_formats="*.tsv" />
      <ITEM name="out_spec3" value="" type="output-file" description="Output TSV files for deconvolved MS3 spectra." required="false" advanced="true" supported_formats="*.tsv" />
      <ITEM name="out_spec4" value="" type="output-file" description="Output TSV files for deconvolved MS4 spectra." required="false" advanced="true" supported_formats="*.tsv" />
      <ITEM name="out_mzml" value="" type="output-file" description="Output mzML file containing deconvolved spectra (for all MS levels)." required="false" advanced="false" supported_formats="*.mzML" />
      <ITEM name="out_quant" value="" type="output-file" description="Output tsv file with isobaric quantification results for MS2 spectra." required="false" advanced="false" supported_formats="*.tsv" />
      <ITEM name="out_annotated_mzml" value="" type="output-file" description="Output annotated mzML file with monoisotopic mass, charge, and isotope index metadata for peaks. Unannotated peaks are also retained without metadata." required="false" advanced="false" supported_formats="*.mzML" />
      <ITEM name="out_msalign1" value="" type="output-file" description="Output msalign (TopFD and ProMex compatible) file for MS1 deconvolved spectra. Ensure filename ends with ms1.msalign for TopPIC GUI compatibility (e.g., result_ms1.msalign; refer to TopPIC input formats)." required="false" advanced="false" supported_formats="*.msalign" />
      <ITEM name="out_msalign2" value="" type="output-file" description="Output msalign (TopFD and ProMex compatible) file for MS2 deconvolved spectra. Ensure filename ends with ms2.msalign for TopPIC GUI compatibility (e.g., result_ms2.msalign; refer to TopPIC input formats)." required="false" advanced="true" supported_formats="*.msalign" />
      <ITEM name="out_feature1" value="" type="output-file" description="Output feature file (TopFD compatible) for MS1 spectra. It is needed for TopPIC feature intensity output (refer to TopPIC input formats)." required="false" advanced="false" supported_formats="*.feature" />
      <ITEM name="out_feature2" value="" type="output-file" description="Output feature file (TopFD compatible) for MS2 spectra. It is needed for TopPIC feature intensity output (refer to TopPIC input formats)." required="false" advanced="true" supported_formats="*.feature" />
      <ITEM name="keep_empty_out" value="false" type="bool" description="Retain empty output files (e.g., *.tsv files with no features)." required="false" advanced="false" />
      <ITEM name="mzml_mass_charge" value="0" type="int" description="Charge state of deconvolved masses in mzML output specified by -out_mzml." required="false" advanced="true" restrictions="-1:1" />
      <ITEM name="write_detail" value="false" type="bool" description="Include detailed peak information (m/z, intensity, charge, isotope index) for each deconvolved mass in the output spectrum tsv files specified by out_spec* options." required="false" advanced="false" />
      <ITEM name="min_mz" value="-1.0" type="double" description="Specify the minimum m/z values for peaks considered during deconvolution. Negative values disable the threshold." required="false" advanced="true" />
      <ITEM name="max_mz" value="-1.0" type="double" description="Specify the maximum m/z values for peaks considered during deconvolution. Negative values disable the threshold." required="false" advanced="true" />
      <ITEM name="min_rt" value="-1.0" type="double" description="Specify the minimum retention time (in minutes) for spectra considered during deconvolution. Negative values disable the threshold." required="false" advanced="true" />
      <ITEM name="max_rt" value="-1.0" type="double" description="Specify the maximum retention time (in minutes) for spectra considered during deconvolution. Negative values disable the threshold." required="false" advanced="true" />
      <ITEM name="max_ms_level" value="-1" type="int" description="Set the maximum MS level (inclusive) for deconvolution. Negative values disable the threshold." required="false" advanced="true" />
      <ITEM name="log" value="" type="string" description="Name of log file (created only when specified)" required="false" advanced="true" />
      <ITEM name="debug" value="0" type="int" description="Sets the debug level" required="false" advanced="true" />
      <ITEM name="threads" value="1" type="int" description="Sets the number of threads allowed to be used by the TOPP tool" required="false" advanced="false" />
      <ITEM name="no_progress" value="false" type="bool" description="Disables progress logging to command line" required="false" advanced="true" />
      <ITEM name="force" value="false" type="bool" description="Overrides tool-specific checks" required="false" advanced="true" />
      <ITEM name="test" value="false" type="bool" description="Enables the test mode (needed for internal use only)" required="false" advanced="true" />
      <NODE name="FD" description="FLASHDeconv algorithm parameters">
        <ITEM name="ida_log" value="" type="string" description="Provide the log file generated by FLASHIda (e.g., IDA*.log) for coupling with FLASHIda acquisition." required="false" advanced="false" />
        <ITEM name="report_FDR" value="false" type="bool" description="Generate q-values (approximate FDR) for deconvolved masses. Decoy masses are also reported which were used for FDR calculation. (Beta version)" required="false" advanced="false" />
        <ITEM name="allowed_isotope_error" value="0" type="int" description="Tolerance for isotope index errors when calculating FDR. For instance, setting a value of 2 permits the inclusion of up to 2 isotope errors as valid matches. Beta version." required="false" advanced="true" />
        <ITEM name="use_RNA_averagine" value="false" type="bool" description="Use the RNA (nucleotide) averagine model for deconvolution." required="false" advanced="true" />
        <ITEM name="precursor_MS1_window" value="3" type="int" description="Number of MS1 spectra around each MS2 spectrum to search for precursor peaks when determining the MS2 precursors. For MS2 spectrum, the mass of precursor ion should be determined for better deconvolution and reliable identification. If the mass of precursor ion is not found in the immediately preceding MS1 spectrum, previous or next MS1 spectra may be used instead. This parameter determines up to how many MS1 spectra around each MS2 spectrum will be searched." required="false" advanced="true" restrictions="1:" />
        <ITEM name="isolation_window" value="5.0" type="double" description="Specify the isolation window width for precursor determination. Used when this information is absent in the mzML file." required="false" advanced="true" />
        <ITEM name="merging_method" value="0" type="int" description="Method for merging spectra before deconvolution. 0: No merging  1: Gaussian averaging per MS level, effective for Q-TOF datasets. For MSn (n &gt; 1), only the spectra from the same precursor mass (subject to tolerance set by SD:tol) are averaged. 2: Block merging, combining all spectra into one per MS level (e.g., for NativeMS datasets)." required="false" advanced="false" restrictions="0:2" />
        <ITEM name="merging_min_ms_level" value="1" type="int" description="Min MS level for merging" required="false" advanced="false" restrictions="1:" />
        <ITEM name="merging_max_ms_level" value="2" type="int" description="Max MS level for merging" required="false" advanced="false" restrictions="1:" />
      </NODE>
      <NODE name="SD" description="Spectral deconvolution parameters">
        <ITEMLIST name="tol" type="double" description="PPM Tolerance for MS1, 2, ...: Specify the tolerance values in parts per million (ppm) using the this option. For example, -tol 10.0 5.0 sets the tolerance to 10.0 ppm for MS1 and 5.0 ppm for MS2. If a negative value (e.g., -1) is provided, the tolerance will be estimated automatically by a tolerance estimation algorithm." required="false" advanced="false">
          <LISTITEM value="10"/>
          <LISTITEM value="10"/>
        </ITEMLIST>
        <ITEM name="min_mass" value="50.0" type="double" description="Minimum mass (Da)" required="false" advanced="false" />
        <ITEM name="max_mass" value="1.0e05" type="double" description="Maximum mass (Da)" required="false" advanced="false" />
        <ITEM name="min_charge" value="1" type="int" description="Minimum charge state for MS1 spectra (can be negative for negative mode). For MSn (n &gt; 1), minimum charge is fixed to 1." required="false" advanced="false" />
        <ITEM name="max_charge" value="100" type="int" description="Maximum charge state for spectra (can be negative for negative mode). Apart from min_charge, this option applies to all MS levelss." required="false" advanced="false" />
        <ITEM name="precursor_charge" value="0" type="int" description="Charge state of the target precursor. All precursor charge for MSn (n &gt; 1) is fixed to this value. When precursor m/z is provided within the input mzML file or is specified using precursor_mz option, precursor mass is calculated accordingly." required="false" advanced="false" restrictions="0:" />
        <ITEM name="precursor_mz" value="0.0" type="double" description="Target precursor m/z value. This option must be used in combination with the -precursor_charge option; otherwise, it will be ignored. If the -precursor_charge option is specified but this option is not, the precursor m/z value from the input mzML file will be used as the default." required="false" advanced="true" restrictions="0.0:" />
        <ITEMLIST name="min_cos" type="double" description="Cosine similarity thresholds between avg. and observed isotope pattern for MS1, 2, ...: e.g., -min_cos 0.3 0.6 to specify 0.3 and 0.6 for MS1 and MS2, respectively." required="false" advanced="true" restrictions="0.5:1.0">
          <LISTITEM value="0.85"/>
          <LISTITEM value="0.85"/>
        </ITEMLIST>
        <ITEMLIST name="min_snr" type="double" description="Minimum charge SNR (the SNR of the isotope pattern of a specific charge) thresholds for MS1, 2, ...: e.g., -min_snr 1.0 0.6 to specify 1.0 and 0.6 for MS1 and MS2, respectively." required="false" advanced="true" restrictions="0.25:">
          <LISTITEM value="0.25"/>
          <LISTITEM value="0.25"/>
        </ITEMLIST>
      </NODE>
      <NODE name="ft" description="Feature tracing parameters">
        <ITEM name="mass_error_ppm" value="-1.0" type="double" description="Specifies the mass error tolerance for feature tracing in ppm. When negative, the MS1 tolerance for deconvolution is used (e.g., 16 ppm is used when -SD:tol 16)." required="false" advanced="true" />
        <ITEM name="quant_method" value="area" type="string" description="Method of quantification for mass traces. For LC data &apos;area&apos; is recommended, &apos;median&apos; for direct injection data. &apos;max_height&apos; simply uses the most intense peak in the trace." required="false" advanced="true" restrictions="area,median,max_height" />
        <ITEM name="min_sample_rate" value="0.1" type="double" description="Minimum fraction of scans along the feature trace that must contain a peak. To raise feature detection sensitivity, lower this value close to 0." required="false" advanced="false" />
        <ITEM name="min_trace_length" value="10.0" type="double" description="Minimum expected length of a mass trace (in seconds). Only for MS1 (or minimum MS level in the dataset) feature tracing. For MSn, all traces are kept regardless of this value." required="false" advanced="false" />
        <ITEM name="max_trace_length" value="-1.0" type="double" description="Maximum expected length of a mass trace (in seconds). Set to a negative value to disable maximal length check during mass trace detection." required="false" advanced="true" />
        <ITEM name="min_cos" value="-1.0" type="double" description="Cosine similarity threshold between avg. and observed isotope pattern. When negative, MS1 cosine threshold for spectral deconvolution (set by -SD:min_cos will be used " required="false" advanced="true" />
      </NODE>
      <NODE name="iq" description="Isobaric quantification parameters">
        <ITEM name="type" value="none" type="string" description="Specifies the isobaric quantification method used in the experiment." required="false" advanced="false" restrictions="none,itraq4plex,itraq8plex,tmt10plex,tmt11plex,tmt16plex,tmt18plex,tmt6plex" />
        <ITEM name="isotope_correction" value="true" type="string" description="Enable isotope correction (highly recommended)." required="false" advanced="false" restrictions="true,false" />
        <ITEM name="reporter_mz_tol" value="2.0e-03" type="double" description="Specifies the m/z tolerance (in Th) for reporter ion detection." required="false" advanced="false" />
        <ITEM name="only_fully_quantified" value="false" type="bool" description="Restricts analysis to spectra that are fully quantified, meaning all channels have non-zero intensity reporter ions." required="false" advanced="false" />
      </NODE>
    </NODE>
  </NODE>
</PARAMETERS>
