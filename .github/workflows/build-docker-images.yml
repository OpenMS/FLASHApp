name: Docker Image CI

on:
  push:
    branches: [ "main", "develop", "deploy"]
  pull_request:
    branches: [ "main", "develop", "deploy"]

jobs:

  build-full-app:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container  # Enables full BuildKit features

      - name: Test Docker build without export
        run: docker buildx build --file Dockerfile --output=type=none .