# Phase 3 review-unit registry — FLASHApp page rebuild from the frozen template.
# Consumed by run_review.py. Oracle paths are READ-ONLY reference behavior.

meta:
  repo: OpenMS/FLASHApp
  branch: claude/kind-heisenberg-u6dVm
  convergence: 3
  oracle_root: /home/user/FLASHApp/src/render
  template_repo: /home/user/streamlit-template
  # Pairs checked by nondivergence.py: FLASHApp must reuse the template module verbatim.
  # Filled in once the template grid module is frozen (Phase 3 step 2).
  nondivergence_pairs:
    # - [/home/user/FLASHApp/src/view/grid.py, /home/user/streamlit-template/src/view/grid.py]

phases:

  "3":
    name: "FLASHApp migration — template-first, freeze, rebuild pages, no divergence"
    gate:
      - name: nondivergence
        cmd: "python migration/nondivergence.py"
        cwd: /home/user/FLASHApp
      - name: template-app-smoke
        cmd: "python -c \"import ast,sys; ast.parse(open('/home/user/streamlit-template/content/visualization_template.py').read()) if __import__('os').path.exists('/home/user/streamlit-template/content/visualization_template.py') else print('template page pending')\""
        cwd: /home/user/streamlit-template
      - name: flashapp-app-smoke
        cmd: "python -c \"import ast; ast.parse(open('/home/user/FLASHApp/content/FLASHDeconv/FLASHDeconvViewer.py').read()); print('FLASHDeconvViewer parses')\""
        cwd: /home/user/FLASHApp
    critics: [template, original-parity, final]   # three critics per unit
    units:
      # --- streamlit-template (built & frozen first) ---
      - id: template:grid
        target: /home/user/streamlit-template/src/view/grid.py   # NEW
        concern: "generic render_linked_grid(layout, builders, state_key, side_by_side) + LayoutManager (<=3 cols, N rows/experiments, side-by-side, JSON save/load)"
        oracle:
          - /home/user/FLASHApp/src/render/render.py
          - /home/user/FLASHApp/content/FLASHDeconv/FLASHDeconvLayoutManager.py
          - /home/user/FLASHApp/content/FLASHTnT/FLASHTnTLayoutManager.py
      - id: template:page
        target: /home/user/streamlit-template/content/visualization_template.py   # NEW
        concern: "demo: Table<->LinePlot<->Heatmap<->SequenceView linked grid + Layout Manager + side-by-side over example parquet"
        oracle:
          - /home/user/FLASHApp/content/FLASHDeconv/FLASHDeconvViewer.py
      - id: template:common
        target: /home/user/streamlit-template/src/common/common.py
        concern: "show_linked_grid() one-liner; keep show_fig/show_table"
        oracle:
          - /home/user/FLASHApp/src/common/common.py
      - id: template:filemanager
        target: /home/user/streamlit-template/src/workflow/FileManager.py
        concern: "results-store data layer (parquet/pickle keyed by (dataset_id,name)) returning data_path; demonstrate store -> data_path -> Insight"
        oracle:
          - /home/user/FLASHApp/src/workflow/FileManager.py

      # --- FLASHApp rebuild (from the frozen template) ---
      - id: flashapp:schema
        target: /home/user/FLASHApp/src/render/schema.py   # NEW
        concern: "FileManager caches -> Insight-ready tidy parquet: stable IDs, exploded arrays, long-format density"
        oracle:
          - /home/user/FLASHApp/src/render/update.py
          - /home/user/FLASHApp/src/render/sequence_data_store.py
      - id: flashapp:builders
        target: /home/user/FLASHApp/src/render/render.py
        concern: "builders factory comp_name -> BaseComponent(data_path=...); one StateManager per (tool, experiment)"
        oracle:
          - /home/user/FLASHApp/src/render/components.py
          - /home/user/FLASHApp/src/render/StateTracker.py
      - id: flashapp:deconv-viewer
        target: /home/user/FLASHApp/content/FLASHDeconv/FLASHDeconvViewer.py
        concern: "every FLASHDeconv panel renders + cross-links (scan->mass->spectrum->3D; protein->tag->sequence; heatmap zoom)"
        oracle:
          - /home/user/FLASHApp/content/FLASHDeconv/FLASHDeconvViewer.py
          - /home/user/FLASHApp/src/render/update.py
      - id: flashapp:tnt-viewer
        target: /home/user/FLASHApp/content/FLASHTnT/FLASHTnTViewer.py
        concern: "every FLASHTnT panel renders + cross-links"
        oracle:
          - /home/user/FLASHApp/content/FLASHTnT/FLASHTnTViewer.py
      - id: flashapp:quant-viewer
        target: /home/user/FLASHApp/content/FLASHQuant/FLASHQuantViewer.py
        concern: "feature table <-> 3D linked view (quant recipe)"
        oracle:
          - /home/user/FLASHApp/content/FLASHQuant/FLASHQuantViewer.py
      - id: flashapp:nondivergence
        target: /home/user/FLASHApp/src/view/grid.py
        concern: "FLASHApp grid code IS the frozen template module (byte-identical, normalized)"
        oracle:
          - /home/user/streamlit-template/src/view/grid.py
