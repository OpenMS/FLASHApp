apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Set explicitly so the namespace transformer also applies to resources
# pulled in by components (e.g. mounted-data); the base kustomization's
# `namespace:` only covers base resources, and a component-added PVC
# without a namespace would break nameReference rewriting (claimName
# would stay un-prefixed).
namespace: openms

resources:
  - ../../base

components:
  - ../../components/memory-tier-high
  # Uncomment to mount a host MS-data drive at /mounted-data and expose
  # the in-app file browser for it. See k8s/components/mounted-data and
  # the "Mounted data drive" section of docs/kubernetes-deployment.md.
  # - ../../components/mounted-data

namePrefix: flashapp-

commonLabels:
  app: flashapp

images:
  - name: openms-streamlit
    newName: ghcr.io/openms/flashapp
    newTag: latest

patches:
  - target:
      kind: IngressRoute
      name: streamlit-traefik
    patch: |
      - op: replace
        path: /spec/routes/0/match
        value: (Host(`flashapp.webapps.openms.de`) || Host(`flashapp.webapps.openms.org`)) && PathPrefix(`/`)
      - op: replace
        path: /spec/routes/0/services/0/name
        value: flashapp-streamlit
  - target:
      kind: Deployment
      name: streamlit
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "redis://flashapp-redis:6379/0"
  - target:
      kind: Deployment
      name: rq-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "redis://flashapp-redis:6379/0"
